# photosite project config — committed, NON-SECRET.
# Bucket names and public URLs are not secrets; they ship in HTML. R2
# credentials live only in your rclone remote. Re-run `photosite setup` to edit.

[site]
title = "Below the Surface"
author = "Andrew Karnani"
publicBaseUrl = "https://img.karnani.io"

[r2]
remote = "img-akarnani-r2"
bucket = "img-akarnani"

[images]
widths = [ 480, 960, 1600, 2400 ]
quality = 80
fallbackWidth = 1600

[keywords]
speciesFromKeywords = false
speciesRoot = "Species"

